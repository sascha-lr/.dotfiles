# Colors
source = $HOME/.config/hypr/colors.conf

$font = Inter Display Regular

general {
    hide_cursor = true
    grace = 0
    disable_loading = true
}

background {
    monitor =
    path = screenshot  
    color = $background
    blur_passes = 3   
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vignette = 0.1
    vignette_intensity = 0.5
}

 auth {
     fingerprint {
         enabled = true
         ready_message = Scan fingerprint to unlock
         present_message = Scanning...
         retry_delay = 250 # in milliseconds
     }
 }

# INPUT FIELD
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.35
    dots_center = true
    
    outer_color = $primary
    inner_color = $surface_container_lowest_transparent_80
    font_color = $primary
    
    fade_on_empty = false
    rounding = -1
    
    check_color = $tertiary
    fail_color = $error
    
    placeholder_text = <i>Password...</i>
    hide_input = false
    
    position = 0, -10
    halign = center
    valign = center
}

# TIME 
label {
    monitor =
    text = $TIME
    color = $primary
    font_size = 64
    font_family = Inter Display Bold
    
    # POSITION: 150 
    position = 0, 150
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $on_surface_variant
    font_size = 18
    font_family = Inter Display Bold 
    
    position = 0, 70
    halign = center
    valign = center
}

shape {  
    monitor =  
    size = 20%, 30%  
    color = $surface_container_lowest_transparent_80
    rounding = 25  
    position = 0, 65  
    halign = center  
    valign = center  
    zindex = 0  
    border_size = 2
    border_color = $primary
}  
