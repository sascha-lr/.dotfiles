gaming_mode = ["-s", "700", "-S"]
lowlatency_mode = ["-s", "700", "-S", "-m", "performance", "-w"]
powersave_mode = ["-m", "powersave"]
server_mode = ["-s", "20000", "-c", "75", "-p", "250"]

[scheds.scx_beerland]
auto_mode = []
gaming_mode = []
lowlatency_mode = []
powersave_mode = []
server_mode = []

[scheds.scx_cake]
